<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>הורדת האפליקציה - OtherTreasure</title>
  <style>
    :root {
      --bg-1: #f7faf7;
      --bg-2: #e4f2eb;
      --card: #ffffff;
      --ink: #153129;
      --muted: #53746a;
      --brand: #0a7268;
      --brand-dark: #0c5b53;
      --line: #c9ded6;
      --apple: #1d1d1f;
      --google: #0b57d0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.2rem;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 100% 0%, rgba(10,114,104,0.12) 0%, rgba(10,114,104,0) 46%),
        radial-gradient(circle at 0% 100%, rgba(10,114,104,0.09) 0%, rgba(10,114,104,0) 52%),
        linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    main {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.08);
      padding: clamp(1rem, 2.5vw, 2rem);
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: clamp(1.5rem, 3.6vw, 2.25rem);
      line-height: 1.2;
      color: var(--brand-dark);
    }

    .subtitle {
      margin: 0 0 1rem;
      font-size: clamp(1rem, 2vw, 1.1rem);
      color: var(--muted);
    }

    .status {
      margin: 0 0 1rem;
      padding: 0.75rem 0.9rem;
      border-radius: 10px;
      border: 1px solid #b7d8ce;
      background: #f2faf6;
      font-weight: 700;
      color: #1f4f3f;
      min-height: 3em;
      display: flex;
      align-items: center;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.7rem;
    }

    .btn {
      text-decoration: none;
      border-radius: 12px;
      padding: 0.85rem 1rem;
      color: #fff;
      font-weight: 700;
      text-align: center;
      transition: transform 140ms ease, filter 140ms ease;
    }

    .btn:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0); }
    .btn-google { background: var(--google); }
    .btn-apple { background: var(--apple); }
    .btn-web { background: var(--brand); }

    @media (max-width: 480px) {
      body { padding: 0.8rem; }
    }
  </style>
</head>
<body>
  <main>
    <h1>מורידים את OtherTreasure</h1>
    <p class="subtitle">תעברו אוטומטית לחנות המתאימה למכשיר שלכם.</p>

    <p id="status" class="status" aria-live="polite">בודק את סוג המכשיר ומעביר לחנות המתאימה...</p>

    <div class="actions" aria-label="קישורי הורדה">
      <a id="google-link" class="btn btn-google" href="#" rel="noopener">הורדה מ-Google Play</a>
      <a id="apple-link" class="btn btn-apple" href="#" rel="noopener">הורדה מ-App Store</a>
      <a id="web-link" class="btn btn-web" href="../index.html" rel="noopener">לאתר OtherTreasure</a>
    </div>

  </main>

  <script>
    const GOOGLE_PLAY_URL = "https://play.google.com/store/apps/details?id=com.yonisadew.othertreasure";
    const APPLE_APP_STORE_URL = "https://apps.apple.com/il/app/other-treasure/id6763492833?l=he";
    const FALLBACK_WEB_URL = "../index.html";

    const statusEl = document.getElementById("status");
    const googleEl = document.getElementById("google-link");
    const appleEl = document.getElementById("apple-link");
    const webEl = document.getElementById("web-link");

    googleEl.href = GOOGLE_PLAY_URL;
    appleEl.href = APPLE_APP_STORE_URL;
    webEl.href = FALLBACK_WEB_URL;

    function isAndroid(ua) {
      return /Android/i.test(ua);
    }

    function isIOS(ua) {
      const iOSLike = /iPhone|iPad|iPod/i.test(ua);
      const iPadOSDesktopUA = /Macintosh/i.test(ua) && navigator.maxTouchPoints > 1;
      return iOSLike || iPadOSDesktopUA;
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function redirect(url) {
      window.location.replace(url);
    }

    (function routeToStore() {
      const url = new URL(window.location.href);
      const forceStore = (url.searchParams.get("store") || "").toLowerCase();

      if (forceStore === "android" || forceStore === "google" || forceStore === "play") {
        setStatus("מעביר ל-Google Play...");
        redirect(GOOGLE_PLAY_URL);
        return;
      }

      if (forceStore === "ios" || forceStore === "apple" || forceStore === "appstore") {
        setStatus("מעביר ל-App Store...");
        redirect(APPLE_APP_STORE_URL);
        return;
      }

      const ua = navigator.userAgent || "";

      if (isAndroid(ua)) {
        setStatus("זוהה מכשיר Android. מעביר ל-Google Play...");
        redirect(GOOGLE_PLAY_URL);
        return;
      }

      if (isIOS(ua)) {
        setStatus("זוהה מכשיר iOS. מעביר ל-App Store...");
        redirect(APPLE_APP_STORE_URL);
        return;
      }

      setStatus("לא זוהתה מערכת הפעלה. בחרו את החנות המתאימה למכשיר שלכם.");
    })();
  </script>
</body>
</html>
